version: "3.1"

intents:
  - greet
  - goodbye
  - request_bot_info
  - check_balance
  - check_accountNumber
  - transfer_funds
  - list_transactions
  - affirm
  - deny
  - inform
  - nlu_fallback
  - ask_informational
  - thank_you
  - chitchat
  - out_of_scope

responses:
  
  utter_greet:
  - text: "Merhabalar! Size nasıl yardımcı olabilirim?"
  - text: "Merhabalar! Size hangi konularda yardımcı olmamı istersiniz?"
  - text: "Selamlar! Bugün finansal işlemlerinizde size nasıl destek olabilirim?"
  - text: "Hoş geldiniz! Ben Gən. Size nasıl yardımcı olabilirim?"
  - text: "Selam! Finansal işlemlerinizde size nasıl yardımcı olabilirim?"
  - text: "İyi günler! Bugün bankacılık işlemleriniz için buradayım."

  utter_goodbye:
  - text: "Görüşmek üzere, iyi günler!"
  - text: "Hoşça kalın, size yardımcı olabildiğime sevindim!"
  - text: "Hoşça kalın! Başka bir ihtiyacınız olursa buradayım."
  - text: "Tekrardan görüşmek dileğiyle!"
  - text: "Görüşmek üzere!"
  - text: "İyi günler dilerim!"
  - text: "Yardımcı olabileceğim başka bir konu yoksa iyi günler dilerim."
  - text: "Kendinize iyi bakın!"
  - text: "Başka bir isteğiniz olursa da buradayım, iyi günler!"

  utter_request_bot_info:
  - text: "Benim ismim Gən. Finansal işlemleriniz için geliştirilmiş dijital asistanınızım."
  - text: "Benim ismim Gən. Dijital bankacılıkta yanınızda bulunan takım arkadaşınızım."
  - text: "Benim ismim Gən. Herhangi bir bankacılık ihtiyacınızda danışabileceğiniz kişisel asistanınızım."
  - text: "Benim ismim Gən. Size daha hızlı ve kolay bankacılık deneyimi sunmak için buradayım."
  - text: "Benim ismim Gən. Bankacılık işlemlerinizi daha hızlı ve güvenli hale getirmek için buradayım."
  - text: "Benim ismim Gənuine. Ama siz bana kısaca Gən diyebilirsiniz."

  utter_ask_rephrase:
  - text: "Üzgünüm, sanırım tam olarak ne demek istediğinizi anlayamadım. Rica etsem farklı bir şekilde ifade edebilir misiniz?"
  - text: "Kusura bakmayın, isteğinizi net olarak kavrayamadım. Lütfen başka sözcüklerle anlatmanız mümkün mü?"
  - text: "Dediğinizi tam olarak anlayamadım, size daha iyi yardımcı olabilmem için lütfen yeniden ifade etmeyi dener misiniz?"
  - text: "Afedersiniz, tam olarak ne demek istediğinizi çözemedim. Biraz daha açabilir misiniz?"

  utter_noworries:
  - text: "Rica ederim, size yardımcı olmak benim görevim!"
  - text: "Ne demek, her zaman buradayım."
  - text: "Ben teşekkür ederim, başka bir arzunuz var mı?"

  utter_chitchat:
  - text: "Teşekkür ederim, sistemlerim tıkır tıkır çalışıyor. Size bankacılık konusunda nasıl yardımcı olabilirim?"
  - text: "Harikayım, umarım siz de öylesinizdir! Finansal işlemleriniz için buradayım."
  - text: "Ben bir dijital bankacılık asistanıyım, günüm her zamanki gibi hesaplamalarla geçiyor. Size nasıl yardım edebilirim?"

  utter_out_of_scope:
  - text: "Bu oldukça ilgi çekici bir konu; ancak benim uzmanlık alanım finansal işlemlerle sınırlı. Size bankacılık konusunda destek olmaktan memnuniyet duyarım."
  - text: "Keşke bu konuda da size yardımcı olabilseydim! Fakat benim bilgim yalnızca bankacılık hizmetlerini kapsıyor. Finansal bir sorunuz olursa buradayım."
  - text: "Maalesef bu isteğinizi yerine getiremiyorum. Sadece bankacılık işlemleri ve finansal konularda yardımcı olmak üzere tasarlandım. Başka bir bankacılık işlemi yapmak ister misiniz?"

  utter_acknowledge_hedge:
  - text: "Hiç sorun değil, emin olmamanız çok doğal. Birlikte kontrol edelim."
  - text: "Endişelenmeyin, ben buradayım. Detaylara birlikte bakalım."

  utter_ask:
  - text: "Başka hangi konuda yardım istersiniz?"
  - text: "Size nasıl yardımcı olabilirim?"
  - text: "Size başka nasıl yardımcı olabilirim?"
  - text: "Finansal işlemlerinizde size nasıl yardımcı olmaya devam edebilirim?"
  - text: "Banka işlemlerinizde size nasıl destek olabilirim?"
  - text: "Yapmak veya sormak istediğiniz başka neler var?"
  - text: "Aklınıza takılan başka bir şey var mı?"
  - text: "Sıradaki işlemimiz ne olsun?"
  - text: "Bana sormak veya yapmak istediğiniz bir şey var mı?"
  - text: "Başka bir isteğiniz var mı?"
  - text: "Devam etmek ister misiniz?"

  utter_check_balance:
  - text: "Hesabınızdaki güncel bakiye {balance} TL."
  - text: "Mevcut bakiyeniz {balance} TL."
  - text: "Hesabınızda bulunan toplam tutar {balance} TL."
  - text: "Hesabınıza tanımlı hesap bakiyesi {balance} TL."
  - text: "Hesabınıza tanımlı hesap bakiyesi {balance} TL."
  - text: "Hesabınızda bulunan tutar {balance} TL."

  utter_check_accountNumber:
  - text: "Sisteme kayıtlı hesap numaranız: {account_number}"
  - text: "Banka hesabınızın numarası {account_number}"
  - text: "Hesap numaranız: {account_number}"
  - text: "IBAN numaranız: {account_number}"
  - text: "Hesabınıza tanımlı hesap numarası {account_number}"
  - text: "Hesabınıza tanımlı IBAN {account_number}"

  utter_transfer_funds:
  - text: "{user} adlı kişiye {money_sum} tutarındaki para transferi işleminiz başarıyla tamamlanmıştır."
  - text: "{user} hesabına {money_sum} gönderildi."
  - text: "{user} kişisine {money_sum} transfer edildi."
  - text: "{user} adlı kişiye {money_sum} tutarında para transferi gerçekleştirildi."
  - text: "{user} kişisine {money_sum} transfer işleminiz başarıyla tamamlanmıştır."
  - text: "{user} adlı kişiye {money_sum} tutarındaki para transferi işleminiz tamamlandı."
  - text: "{user} kişisine {money_sum} transfer işleminiz başarıyla sonuçlandırıldı."
  - text: "{user} adlı kişiye {money_sum} tutarındaki para transferi işleminiz başarıyla sonuçlandırıldı."

  utter_list_transactions:
  - text: "Gerçekleştirdiğiniz son işlemleriniz listeleniyor..."
  - text: "Son işlemleriniz aşağıdadır:"
  - text: "Hesabınızdaki son işlemler:"
  - text: "Son İşlemleriniz:\n{transactions}"

  utter_ask_user:
  - text: "Elbette, kime para göndermek istersiniz?"
  - text: "Elbette, kime para göndermek istiyorsunuz?"
  - text: "Tabii ki de, kime para göndermek istersiniz?"
  - text: "Tabii ki de, kime para göndermek istiyorsunuz?"
  - text: "Kime transfer yapmak istersiniz?"
  - text: "Kime para transferi yapmak istiyorsunuz?"
  - text: "Kime para göndermek istiyorsun?"

  utter_ask_money_sum:
  - text: "Peki, ne kadar para göndermek istersiniz?"
  - text: "Ne kadar para göndermek istersiniz?"
  - text: "Peki, ne kadar para göndermek istiyorsunuz?"
  - text: "Ne kadar para göndermek istiyorsunuz?"

  utter_confirm_transfer:
  - text: "{user} adlı kişiye {money_sum} göndermek üzeresiniz. Onaylıyor musunuz?"
  - text: "{user} kişisine {money_sum} transfer etmek üzeresiniz. Onaylıyor musunuz?"
  - text: "{user} kişisine {money_sum} tutarında para transferi gerçekleştirmek üzeresiniz. Onaylıyor musunuz?"
  - text: "{user} adlı kişiye {money_sum} tutarındaki para transferi işleminizi gerçekleştirmek üzeresiniz. Onaylıyor musunuz?"


  utter_transfer_cancelled:
  - text: "İsteğiniz üzerine işlemi hemen iptal ettim. Endişelenmeyin, hesabınızdan herhangi bir tutar düşmedi."
  - text: "Para transferi işlemi güvenle iptal edildi. Hiçbir sorun yok, bakiyeniz güvende. Başka nasıl yardımcı olabilirim?"
  - text: "Anladım, transfer işlemini durdurdum. İşlem gerçekleşmedi."

actions:
  - action_check_balance
  - action_transfer_funds
  - action_list_transactions
  - action_answer_faq

entities:
  - account_number
  - money_sum
  - user
  - name

slots:
  persona:
    type: text
    influence_conversation: false
    mappings:
    - type: custom
  user:
    type: text
    influence_conversation: false
    mappings:
    - type: from_entity
      entity: user
    - type: from_text
      conditions:
      - active_loop: transfer_form
        requested_slot: user
  money_sum:
    type: any
    influence_conversation: false
    mappings:
    - type: from_entity
      entity: money_sum
    - type: from_text
      conditions:
      - active_loop: transfer_form
        requested_slot: money_sum
  account_number:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: account_number
  balance:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

forms:
  transfer_form:
    required_slots:
      - user
      - money_sum
    ignored_intents:
      - greet
      - goodbye
      - request_bot_info
      - check_balance
      - ask_informational

session_config:
  session_expiration_time: 180
  carry_over_slots_to_new_session: true

