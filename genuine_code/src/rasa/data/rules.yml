version: "3.1"

rules:
- rule: Handle goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Handle greet
  steps:
  - intent: greet
  - action: utter_greet

- rule: Learn account number
  steps:
  - intent: check_accountNumber
  - action: utter_check_accountNumber

- rule: Check balance
  steps:
  - intent: check_balance
  - action: action_check_balance
  - action: utter_ask

- rule: List transactions
  steps:
  - intent: list_transactions
  - action: action_list_transactions
  - action: utter_ask

- rule: Activate transfer form
  steps:
  - intent: transfer_funds
  - action: transfer_form
  - active_loop: transfer_form

- rule: Submit transfer form and ask for confirmation
  condition:
  - active_loop: transfer_form
  steps:
  - action: transfer_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: utter_confirm_transfer

- rule: Execute transfer after confirmation
  steps:
  - intent: affirm
  - action: action_transfer_funds
  - action: utter_transfer_funds
  - action: utter_ask

- rule: Cancel transfer after denial
  steps:
  - intent: deny
  - action: utter_transfer_cancelled
  - action: utter_ask

- rule: Handle NLU fallback
  steps:
  - intent: nlu_fallback
  - action: utter_ask_rephrase

- rule: Learn about the assistant
  steps:
  - intent: request_bot_info
  - action: utter_request_bot_info

- rule: Answer informational questions (RAG)
  steps:
  - intent: ask_informational
  - action: action_answer_faq

- rule: Respond to thank you
  steps:
  - intent: thank_you
  - action: utter_noworries

- rule: Respond to chitchat
  steps:
  - intent: chitchat
  - action: utter_chitchat
  - action: utter_ask

- rule: Respond to out of scope
  steps:
  - intent: out_of_scope
  - action: utter_out_of_scope
  - action: utter_ask