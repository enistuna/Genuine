stories:
- story: Check balance path
  steps:
  - user: "hesabıma bakar mısın"
    intent: check_balance
  - action: action_check_balance
  - action: utter_check_balance
  - action: utter_ask

- story: List transactions path
  steps:
  - user: "işlemleri göster"
    intent: list_transactions
  - action: action_list_transactions
  - action: utter_list_transactions
  - action: utter_ask

- story: Transfer funds happy path with confirmation
  steps:
  - user: "Enis'e 50 lira yolla"
    intent: transfer_funds
    entities:
    - user: "Enis"
    - money_sum: "50 lira"
  - action: transfer_form
  - active_loop: transfer_form
  - slot_was_set:
    - user: "Enis"
  - slot_was_set:
    - money_sum: "50 lira"
  - active_loop: null
  - action: utter_confirm_transfer
  - user: "evet"
    intent: affirm
  - action: action_transfer_funds
  - action: utter_transfer_funds
  - action: utter_ask

- story: Transfer funds happy path with denial
  steps:
  - user: "Enis'e 50 lira yolla"
    intent: transfer_funds
    entities:
    - user: "Enis"
    - money_sum: "50 lira"
  - action: transfer_form
  - active_loop: transfer_form
